name: Push to Replicate

on:
  push:
    branches:
      - master  # Workflow akan berjalan otomatis pada branch 'main'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # explicit include-based build matrix, of known valid options
      matrix:
        include:
          # 22.04 supports CUDA 11.7+
          - os: ubuntu-22.04
            cuda: "12.0"
          # 18.04 supports CUDA 10.1+ (gxx <= 8), but were deprecated on 2022-08-08 and unsupported from 2023-04-01
          # - os: ubuntu-18.04
          #   cuda: "10.2"
          #   gcc: 8
          # - os: ubuntu-18.04
          #   cuda: "10.1"
          #   gcc: 8
          # 16.04 runners are deprecated / removed in september 2021.
          # It should still be possible to install CUDA 8 - CUDA 10 in 18.04 images by using the 16.04 repository, but install_cuda_ubuntu.sh would require changes to do so / a way to override the repository to use.
    env:
      build_dir: "build"
      config: "Release"

    steps:
    - uses: actions/checkout@v3

    - name: Install CUDA
      env:
        cuda: ${{ matrix.cuda }}
      run: ./scripts/actions/install_cuda_ubuntu.sh
      shell: bash

    # Specify the correct host compilers
    - name: Install/Select gcc and g++ 
      run: |
        sudo apt-get install -y gcc-${{ matrix.gcc }} g++-${{ matrix.gcc }}
        echo "CC=/usr/bin/gcc-${{ matrix.gcc }}" >> $GITHUB_ENV
        echo "CXX=/usr/bin/g++-${{ matrix.gcc }}" >> $GITHUB_ENV
        echo "CUDAHOSTCXX=/usr/bin/g++-${{ matrix.gcc }}" >> $GITHUB_ENV

    - name: Configure cmake
      id: configure
      run: cmake . -B ${{ env.build_dir }} -DCMAKE_BUILD_TYPE=${{ env.config }}

    - name: Configure Error Processing
      if: ${{ failure() && steps.configure.outcome == 'failure' }}
      run: |
          if [[ -d "${{ env.build_dir }}" ]]; then
            pushd "${{ env.build_dir }}"
            if [[ -f "CMakeFiles/CMakeOutput.log" ]]; then
              echo "---- CMakeFiles/CMakeOutput.log"
              cat CMakeFiles/CMakeOutput.log
              echo "----"
            fi
            if [[ -f "CMakeFiles/CMakeError.log" ]]; then
              echo "---- CMakeFiles/CMakeError.log"
              cat CMakeFiles/CMakeError.log
              echo "----"
            fi
          fi
    - name: Build everything else
      working-directory: ${{ env.build_dir }}
      run: cmake --build . --target all --verbose -j `nproc`
  push_to_replicate:
    name: Push to Replicate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          docker-images: false
      - name: Install NVIDIA Drivers
        run: |
          echo "Installing NVIDIA drivers and CUDA Toolkit..."
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            nvidia-driver-525
      - name: Setup Cuda Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: '12.5.0'
      - name: Verify NVIDIA Driver and CUDA Installation
        run: |
          echo "Verifying NVIDIA driver and CUDA installation..."
          # nvidia-smi
          nvcc --version
      - name: Check cuda setup Toolkit
        run: |
          echo "Installed cuda version is: ${{steps.cuda-toolkit.outputs.cuda}}"
          echo "Cuda install location: ${{steps.cuda-toolkit.outputs.CUDA_PATH}}"
          nvcc -V
      - name: Reboot system after instalation
        run:  sudo reboot
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_API_TOKEN }}

      - name: Prepare Lora Model
        working-directory: src/dawetAI/workflow/replicate
        run: |
          # Check and remove existing lora_model directory
          if [ -d "lora_model" ]; then
            echo "Found existing lora_model directory. Removing..."
            rm -rf lora_model
          fi

          # Download the model
          echo "Downloading model..."
          wget -q https://files.catbox.moe/ujxa6r.zip

          # Extract the model
          echo "Extracting model..."
          unzip -q ujxa6r.zip -d lora_model

          # Remove the zip file
          echo "Cleaning up zip file..."
          rm -f ujxa6r.zip

      - name: Push to Replicate
        working-directory: src/dawetAI/workflow/replicate
        run: |
          cog push r8.im/abdanhafidz/dawet-ai
